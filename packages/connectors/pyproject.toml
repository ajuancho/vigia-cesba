[project]
name = "vigia-connectors"
version = "0.1.0"
description = "Connectors a fuentes de datos legislativas argentinas (InfoLEG/BO, HCDN, Senado)"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "tenacity>=8.5",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigia_connectors"]
