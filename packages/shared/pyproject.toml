[project]
name = "vigia-shared"
version = "0.1.0"
description = "Modelos SQLAlchemy + schemas Pydantic compartidos"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "sqlalchemy[asyncio]>=2.0",
    "greenlet>=3.0",
    "alembic>=1.13",
    "asyncpg>=0.29",
    "psycopg[binary]>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigia_shared"]
