name: build-images

# Buildea y publica las imágenes del backend (api + workers) a GHCR.
# El web (apps/web) se despliega aparte en Vercel.

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/workers/**"
      - "packages/**"
      - "db/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vigia

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages
        run: |
          pip install -e packages/shared -e packages/connectors -e apps/workers -e apps/api
          pip install pytest pytest-asyncio respx
      - name: Run tests
        run: pytest packages/connectors/tests apps/workers/tests -q

  build:
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: workers
            dockerfile: apps/workers/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
